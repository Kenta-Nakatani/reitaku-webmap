<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>麗澤大学周辺の市境</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQm0T5xz5B3FcP5S/CpBBouXH8aD2/g="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>麗澤大学周辺の市境</h1>
        <p>柏市・松戸市・流山市と麗澤大学敷地の位置関係</p>
      </div>
      <div class="legend" aria-label="凡例">
        <span><i class="kashiwa"></i>柏市</span>
        <span><i class="matsudo"></i>松戸市</span>
        <span><i class="nagareyama"></i>流山市</span>
        <span><i class="reitaku"></i>麗澤大学</span>
      </div>
    </header>

    <main>
      <div id="map" aria-label="麗澤大学周辺の市境マップ"></div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./main.js"></script>
  </body>
</html>
